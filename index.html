<!DOCTYPE html>
<html>
<head>
  <title>Mother's Day Surprise</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #ffe4e6, #fff1f2);
      font-family: sans-serif;
    }

    .container {
      width: 320px;
      background: white;
      border-radius: 30px;
      padding: 20px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    }

    .balloons {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
      margin-top: 30px;
    }

    .balloon {
      width: 70px;
      height: 90px;
      border-radius: 50%;
      cursor: pointer;
      position: relative;
      animation: float 2s infinite ease-in-out;
    }

    .balloon::after {
      content: '';
      width: 2px;
      height: 60px;
      background: gray;
      position: absolute;
      left: 50%;
      top: 90px;
    }

    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }

    .hidden {
      display: none;
    }

    img {
      width: 100%;
      border-radius: 20px;
      margin-top: 20px;
    }

    button {
      margin-top: 20px;
      background: #f43f5e;
      color: white;
      border: none;
      padding: 12px 20px;
      border-radius: 999px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<div class="container">

  <h1 style="color:#be123c;">Happy Mother's Day 💐</h1>

  <div id="balloonScreen">

    <p>Pop a balloon for a surprise 🎈</p>

    <div class="balloons">

      <div class="balloon bg-pink-500" onclick="showCard(0)"></div>
      <div class="balloon bg-purple-500" onclick="showCard(1)"></div>
      <div class="balloon bg-orange-500" onclick="showCard(2)"></div>

    </div>
  </div>

  <div id="cardScreen" class="hidden">

    <img id="photo" src="" />

    <p id="message"></p>

    <button onclick="back()">Pop Another Balloon</button>

  </div>

</div>

<script>

const surprises = [

{
image: "https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=800",
message: "Thanks for supporting me every day ❤️"
},

{
image: "https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=800",
message: "You are my biggest strength 💖"
},

{
image: "https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=800",
message: "Love you forever mom 🌸"
}

];

function showCard(index) {

document.getElementById("balloonScreen").classList.add("hidden");

document.getElementById("cardScreen").classList.remove("hidden");

document.getElementById("photo").src = surprises[index].image;

document.getElementById("message").innerText = surprises[index].message;

}

function back() {

document.getElementById("cardScreen").classList.add("hidden");

document.getElementById("balloonScreen").classList.remove("hidden");

}

</script>

</body>
</html>
