<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Mother's Day Balloon Surprise</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
margin:0;
overflow:hidden;
font-family:sans-serif;
background:linear-gradient(to bottom,#ffe4e6,#fff1f2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:340px;
height:620px;
background:white;
border-radius:35px;
position:relative;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.15);
}

.title{
text-align:center;
padding-top:25px;
color:#be123c;
font-size:32px;
font-weight:bold;
}

.subtitle{
text-align:center;
color:#e11d48;
font-size:14px;
padding:0 20px;
margin-top:10px;
}

.balloon{
width:70px;
height:90px;
border-radius:50%;
position:absolute;
cursor:pointer;
animation:float 6s linear infinite;
}

.balloon::after{
content:'';
width:2px;
height:70px;
background:#666;
position:absolute;
left:50%;
top:90px;
}

@keyframes float{
0%{
transform:translateY(700px);
}
100%{
transform:translateY(-900px);
}
}

.card{
position:absolute;
inset:0;
background:white;
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
padding:20px;
}

.card img{
width:260px;
height:340px;
object-fit:cover;
border-radius:25px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

.message{
margin-top:20px;
font-size:20px;
color:#444;
text-align:center;
font-style:italic;
}

.backBtn{
margin-top:25px;
background:#f43f5e;
color:white;
border:none;
padding:14px 28px;
border-radius:999px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="title">Happy Mother's Day 💐</div>

<div class="subtitle">
Tap any floating balloon for a surprise 🎈
</div>

<!-- BALLOONS -->

<div class="balloon bg-pink-500"
style="left:20px; animation-duration:7s;"
onclick="showCard(0)">
</div>

<div class="balloon bg-purple-500"
style="left:120px; animation-duration:6s;"
onclick="showCard(1)">
</div>

<div class="balloon bg-orange-500"
style="left:220px; animation-duration:8s;"
onclick="showCard(2)">
</div>

<div class="balloon bg-blue-500"
style="left:150px; animation-duration:5s;"
onclick="showCard(3)">
</div>

<!-- CARD SCREEN -->

<div class="card" id="card">

<img id="photo" src="" />

<div class="message" id="message"></div>

<button class="backBtn" onclick="goBack()">
Back 🎈
</button>

</div>

</div>

<script>

const surprises = [

{
image:"https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=800",
message:"Thank you for loving me endlessly ❤️"
},

{
image:"https://images.unsplash.com/photo-1511988617509-a57c8a288659?q=80&w=800",
message:"You are my biggest strength 💖"
},

{
image:"https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=800",
message:"Life is beautiful because of you 🌸"
},

{
image:"https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?q=80&w=800",
message:"Happy Mother's Day Mom 💐"
}

];

function showCard(index){

document.getElementById("card").style.display="flex";

document.getElementById("photo").src=
surprises[index].image;

document.getElementById("message").innerText=
surprises[index].message;

}

function goBack(){

document.getElementById("card").style.display="none";

}

</script>

</body>
</html>
